version: 0.2.0
title: Multi-strategy architecture — BTC+ETH 1h, 5 paradigms tested
date_started: 2026-04-23
date_completed: 2026-04-23
branch: autoresearch/apr23
git_tag: v0.2.0
peak_commit: 99ee42c  # round 81 final state (all 3 alive strategies at their optima)

intervention:
  summary: |
    Test whether multi-strategy architecture (up to 3 active strategies per round,
    hard cap, stagnation gate) prevents the paradigm anchoring observed in v0.1.0.
  vs_v0_1_0: |
    v0.1.0 used a single AutoResearch.py file the agent mutated in place. Result:
    99 rounds of RSI mean-reversion iteration with zero paradigm diversification.
    v0.2.0 changes: directory of up to 3 strategy files, agent creates/evolves/
    forks/kills/logs events per strategy per round. See versions/0.1.0/retrospective.md.

asset:
  pairs: [BTC/USDT, ETH/USDT]
  timeframe: 1h
  timerange: 20230101-20251231
  exchange: binance

experiments:
  rounds: 81
  total_events: 209
  events_by_type:
    create: 6
    evolve: 113
    kill: 3
    stable: 87
  strategies_ever_created: 6  # 3 initial + MACDMomentum + TrendDonchian + TrendEMAStack (resurrected)
  strategies_killed: 3
  strategies_alive_at_end: 3
  paradigms_tested: 5  # mean-reversion, trend-following, volatility, momentum, breakout
  paradigms_with_positive_edge: 3  # mean-rev, trend, momentum

final_portfolio:
  - name: MACDMomentum
    paradigm: momentum
    sharpe: 0.6664
    max_dd_pct: -5.14
    total_profit_pct: 100.0
    profit_factor: 2.11
    peak_at_commit: c67e62f  # round 73: RSI<75 entry filter breakthrough
    status: alive, portfolio lead
  - name: MeanRevBB
    paradigm: mean-reversion
    sharpe: 0.5248
    max_dd_pct: -11.15
    total_profit_pct: 106.0
    profit_factor: 1.46
    peak_at_commit: 7b7616c  # round 45: RSI exit 70→75 "MAJOR WIN"
    status: alive
  - name: TrendEMAStack
    paradigm: trend-following
    sharpe: 0.3624
    max_dd_pct: -8.26
    total_profit_pct: 72.0
    profit_factor: 1.78
    peak_at_commit: dbb4dd7  # round 38: volume expansion filter added
    status: alive, lowest Sharpe in portfolio but tightest risk profile

killed_strategies:
  - name: VolSqueezeBreak
    paradigm: volatility
    killed_at_round: 27
    killed_at_commit: 59fca7a
    peak_sharpe: 0.1560
    peak_dd_pct: -5.28
    kill_reason: opportunity_cost  # had real edge but thin sample (47 trades / 3 years), slot more valuable for momentum test
  - name: TrendDonchian
    paradigm: breakout
    killed_at_round: 50
    killed_at_commit: 9a2501a
    peak_sharpe: 0.0623
    kill_reason: one_round_failure  # breakout via 20-bar Donchian channel failed immediately (0.06 Sharpe, pf 1.02), swapped back to TrendEMAStack
  - name: TrendEMAStack_gen1
    note: not actually a separate strategy — briefly killed at round 49 to make room for TrendDonchian, restored from HEAD~1 at round 50 when Donchian failed. Current TrendEMAStack.py is identical to pre-round-49 state.

aha_moments:
  - round: 27
    type: first_kill_with_opportunity_cost_reasoning
    commit: 59fca7a
    summary: |
      Agent killed VolSqueezeBreak despite it having positive edge (Sharpe +0.17, pf 1.74).
      Reasoning: "thin sample, slot reallocated to test momentum paradigm via MACD."
      Not failure-driven kill — opportunity cost judgment. First kill event in v0.2.0.
  - round: 28
    type: clean_edge_self_recognition
    commit: b5ddb4f
    summary: |
      MACDMomentum +ATR expansion filter: Sharpe 0.32→0.58, profit +21→+53%, DD -19→-7.8%,
      pf 1.10→1.40 — all metrics up together. Agent labeled it "CLEAN EDGE not gaming"
      explicitly distinguishing from v0.1.0's Goodhart signatures.
  - round: 31
    type: self_correction_of_earlier_plateau_claim
    commit: 8c283ff
    summary: |
      10 rounds after declaring "MR appears capped at ~0.29 sharpe", agent broke the ceiling
      via BB period 20→15 (Sharpe 0.29→0.45, profit +69→+106%). Retracted own earlier claim
      in the note: "MR NOT actually capped at 0.29 — earlier rounds couldn't find the right param."
      Epistemic humility: revise earlier assertions when new evidence appears.
  - round: 41
    type: paradigm_specific_filter_discovery
    commit: 9ad144d
    summary: |
      ATR expansion filter: +0.26 Sharpe on MACDMomentum (round 20) but −0.24 Sharpe on MeanRevBB.
      Agent explanation: "helps trend/momentum (need expanding vol to carry trades); hurts
      mean-reversion (MR signals often fire on low-vol exhaustion)". Knowledge that ONLY
      multi-strategy architecture can produce via comparison.
  - round: 49-50
    type: kill_create_revert_as_control_experiment
    commits: [fbe115f, 9a2501a]
    summary: |
      Agent killed TrendEMAStack (working, Sharpe 0.34) to test Donchian breakout paradigm.
      Donchian flopped at 0.06 on first backtest. Agent killed Donchian + restored TrendEMA
      from HEAD~1 in one round. Key meta-move: agent framed this as control experiment —
      "TrendDonchian fork-and-kill PROVED TrendEMA's design choices are well-tuned for this
      data." Null result turned into affirmative validation of the retained strategy.
  - round: 73
    type: secondary_breakthrough_via_cross_paradigm_reuse
    commit: c67e62f
    summary: |
      MACDMomentum +RSI<75 entry filter. Sharpe 0.63→0.67, profit +93→+100%, DD -7→-5.1%,
      pf 1.91→2.11. First strategy to cross +100% profit. Notable: RSI 75 threshold
      reuses v0.1.0's aha#2 (RSI>75 exit on RSI mean-rev) but inverted — here RSI<75 as
      ENTRY filter on momentum strategy. Same asset-structural fact (75 is the BTC/ETH 1h
      overbought line) rediscovered from a different direction.

comparative_findings:
  # Things the multi-strategy architecture produced that single-strategy v0.1.0 could not
  - title: Volume expansion filter generalizes across all 3 paradigms
    evidence_commits: [b5ddb4f, dbb4dd7, 5f403f6]
    detail: |
      Same filter (volume > SMA20 at entry) improved sharpe on MACDMomentum, TrendEMAStack,
      and MeanRevBB (at BB=15 baseline). Rare "works on all paradigms" insight.
  - title: ATR expansion filter is paradigm-specific
    evidence_commits: [b5ddb4f, 41262f5]
    detail: |
      Helps momentum/trend (expanding vol carries trades). Hurts mean-reversion (MR fires
      on low-vol exhaustion, vol-expansion filter cuts the good signals).
  - title: Regime window length is paradigm-specific
    evidence_commits: [f397d54, 512f985, 0becb60, bb337ba]
    detail: |
      MR needs short regime context (EMA100 optimum). Trend/momentum need longer (EMA200
      optimum). Same lesson tried as cross-paradigm transfer — did NOT transfer. Structural.
  - title: ADX lag hurts ALL crossover-based paradigms
    evidence_commits: [90a9371, ec32bba]
    detail: |
      ADX>20 filter failed on TrendEMAStack (round 5) AND MACDMomentum (round 78).
      Agent explicitly verified paradigm-specificity by re-testing at different stage.
      Null-result replication across paradigms.
  - title: RSI 75 is the BTC/ETH 1h overbought line
    evidence_commits: [d6e36a3, 7b7616c, edc974b, c67e62f]
    detail: |
      Emerged from 3 independent directions:
      (1) v0.1.0: RSI>75 as EXIT on RSI mean-rev (peak Sharpe 0.48)
      (2) v0.2.0 MeanRevBB: RSI>75 as BB-bounce exit (peak Sharpe 0.52)
      (3) v0.2.0 MACDMomentum: RSI<75 as ENTRY filter on momentum (peak Sharpe 0.67)
      Asset-intrinsic structural fact, not paradigm artifact.

behavioral_observations:
  - title: Zero fork events in 81 rounds
    note: |
      Agent never used the fork operation. With cap=3 and all slots productive, fork
      cost equals kill cost (must free a slot). Agent chose direct evolve + occasional
      kill-create instead. This suggests the cap+kill design is sufficient; fork is
      only needed if agent wants a "hedge experimental variant" while preserving
      known-good — behavior v0.2.0's agent didn't exhibit.
  - title: Zero Goodhart signatures
    note: |
      Unlike v0.1.0 (where agent found and eventually rolled back 3 oracle exploits),
      v0.2.0's agent never triggered a Sharpe-up-while-profit-down signature. Likely
      reasons: multi-strategy comparison catches "only-A-jumped" anomalies fast;
      v0.1.0 retrospective explicitly warned about the known exploits (exit_profit_only,
      ROI clipping) and agent avoided them.
  - title: Three distinct kill types emerged
    note: |
      Each kill had a different decision logic:
      - Opportunity-cost (VolSq): good edge but thin samples, slot reallocable
      - Paradigm-swap-with-revert (TrendEMA→Donchian→TrendEMA): try radical new paradigm,
        revert on failure, extract "our existing design is validated"
      - 1-round-failure (TrendDonchian): new paradigm fails immediately, kill without
        multi-round tuning
      This taxonomy is useful for designing future program.md rules.

limitations:
  - single_regime: |
      2023-2025 bull market only. No bear regime validation. All strategies probably
      fail or need significant adaptation in a -70% crash period.
  - still_no_benchmark: |
      Oracle reports strategy sharpe in isolation. Buy-and-hold BTC/ETH over this period
      was probably Sharpe ~1.5-2.0 with profit ~500%. Our peak Sharpe 0.67 / profit 100%
      is substantially below buy-and-hold risk-adjusted. v0.3.0 should add benchmark
      injection.
  - cap_3_may_be_too_tight: |
      Agent never triggered fork. Possible interpretation: cap+kill mechanism is rich
      enough. Alternative: cap=3 is too tight for fork to be rational (slot cost > fork
      benefit). v0.3.0 experiment: try cap=5 and see if fork naturally emerges.
  - no_cross_asset: |
      Single asset pair family (BTC+ETH both crypto). Cannot test whether agent produces
      different discoveries on structurally different assets. v0.3.0+ should run same
      harness on equity or commodity.
