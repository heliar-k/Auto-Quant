paradigm_specific_findings:
  - title: 1d regime filters are structural regularization against overfitting
    detail: |
      Removing 1d regime filters (EMA200, EMA50) consistently improved train
      Sharpe but destroyed test performance. TrendMtfConfluence: +0.76 train,
      -2.71 test. SuperTrendPullback: +1.08 train, -2.58 test. PanicReboundMTF:
      +0.21 train, -1.07 test. Only RangeExpansionBreakout benefited from its
      1d EMA100 — it was the only strategy with positive test Sharpe (0.26).
      The mechanism: 2023-2024 was a bull market where dips below the 200-day
      were recoverable pullbacks. In 2025-Q1 2026, those dips were trend failures.

  - title: SuperTrend is a viable 5th paradigm
    detail: |
      SuperTrendPullback (first SuperTrend strategy in any Auto-Quant run) hit
      0.70 train Sharpe on first attempt and reached 1.81 after optimization.
      Full multi-regime Sharpe 0.36 with +130% profit. The paradigm has edge
      but the current exit mechanism (SuperTrend flip) is too slow — -63.5% DD
      in the 2022 bear market. A faster EMA-based exit or regime-based position
      sizing would likely improve DD without sacrificing the paradigm's edge.

  - title: Cross-pair-primary doesn't generalize to shorter train periods
    detail: |
      Two cross-pair-primary attempts (BTCLeaderBreakout via Donchian, BTCMomentumLeader
      via ROC) both failed. BTCLeaderBreakout reached 0.75 after fixing a price-unit
      comparison bug but couldn't be improved. BTCMomentumLeader was negative from
      inception. The v0.3.1 version hit 0.91 on 2023-2025 — the shorter train period
      (2023-2024) may lack sufficient BTC-led breakout episodes.

  - title: All legacy v0.3.x parameter optima confirmed robust
    detail: |
      45 evolves across 50 rounds. Only ~7 produced improvement, and all of those
      were structural (removing filters, adding exits). Every parameter tweak —
      even 2-period indicator changes — caused regression. The v0.3.x bracketing
      (100+ rounds across 3 runs) found genuine local optima.

  - title: Exit mechanisms remain paradigm-specific
    detail: |
      SuperTrendPullback's SuperTrend-flip exit (-63.5% DD) vs TrendMtfConfluence's
      4h EMA cross exit (-30.3% DD) shows that exit mechanism design dominates DD
      control in bear markets. Both are trend-following, but SuperTrend's ATR-based
      exit lags more during trend reversals than EMA-based exit. Exit design for
      bear-market robustness is the key open question for SuperTrend.

  - title: Fork is a phantom operation at both cap=3 and cap=5
    detail: |
      Only 2 forks across 247 combined rounds (v0.3.0 run 1 + this run). The agent
      consistently prefers create/kill over fork regardless of cap size. Fork may
      be more useful if the program.md explicitly required it as an exploration
      primitive, or if strategies carried "pedigree" metadata that fork preserves.

behavioral_observations:
  - title: Stagnation rule forces destructive churn at optima
    note: |
      Rounds 37-50 (14 rounds) produced zero new knowledge. The 4 legacy strategies
      were at confirmed optima, but the stagnation rule (must evolve/fork/kill after
      3 stable rounds) forced parameter changes that consistently regressed. The
      agent resorted to alternating tiny changes and reverts. A "locked" state for
      confirmed-optimum strategies would free the agent to focus on the experimental
      slot.
  - title: Train-only loop produces false confidence
    note: |
      The 1d regime filter removal was the highest-reward action on train metrics,
      and the agent correctly identified it as an improvement. Only the test
      validation revealed it as overfitting. This validates the v0.4.0 architecture:
      exploration and evaluation must use different data.
  - title: Agent discovered and exploited regime-filter vulnerability
    note: |
      The agent independently discovered that removing 1d regime filters improved
      train Sharpe and applied the pattern across multiple strategies (SuperTrend
      in r29, TrendMtf in r34, PanicRebound in r35). This is cross-paradigm pattern
      recognition — the agent found a general principle and applied it systematically.
      That the principle turned out to be overfitting doesn't diminish the behavior;
      it validates why the architecture separates exploration from evaluation.
  - title: Five-strategy portfolio at cap=5 is functional
    note: |
      Five strategies across four paradigms (trend-following ×2, momentum, volatility
      breakout, mean-reversion) ran smoothly. No strategy interference, no timeout
      issues. Cap=5 is the right size for the current paradigm diversity.

limitations:
  - overfit_portfolio: |
      3 of 5 strategies have negative test Sharpe. Only LeaderVolumeMomentum and
      RangeExpansionBreakout generalize positively. The train-only optimization
      loop predictably overfit despite the test split catching it post-hoc.
  - short_test_period: |
      2025-01 to 2026-01 is ~13 months. A single anomalous quarter can dominate.
      TrendMtfConfluence's -1.31 test vs 0.89 full suggests the test period was
      unusually hostile to trend-following. Multi-window validation would help.
  - supertrend_dd: |
      -63.5% full-regime DD makes SuperTrendPullback untradeable. Needs structural
      DD control before it can be considered a viable strategy.
  - crosspair_primary_failure: |
      Cross-pair-primary paradigm (v0.3.1 winner at 0.91) failed on 2023-2024
      train period. May require longer timeranges or different trigger design.
  - stagnation_churn: |
      Rounds 37-50 produced no knowledge. The stagnation rule needs reform for
      strategies at confirmed optima.
  - panicreboundmf_degradation: |
      Removing 1d EMA50 from PanicReboundMTF degraded full-regime performance
      compared to the v0.3.x version. The 100-round bracketed optimum was better.
