version: 0.3.0
title: Multi-timeframe + 5-pair portfolio + per-pair reporting
date_started: 2026-04-24
date_completed: 2026-04-25
branches:
  - autoresearch/apr24   # Run 1: peak Sharpe 1.07 (cross-pair breakout)
  - autoresearch/apr24b  # Run 2: 3 paradigms all ≥ 0.52 (paradigm mapping)

intervention:
  summary: |
    Expand the information space strategies can access, along three orthogonal
    axes, on top of v0.2.0's multi-strategy architecture:
      (1) Multi-timeframe: 4h + 1d data pre-downloaded, @informative decorator
          exposes higher-TF context.
      (2) Portfolio universe: 2 pairs → 5 pairs (BTC, ETH, SOL, BNB, AVAX).
          max_open_trades 2 → 5.
      (3) Per-pair reporting: run.py emits per-pair metrics alongside aggregate,
          letting agents reason about asset-specific edge rather than hidden
          portfolio averages.
  vs_v0_2_0: |
    v0.2.0 peaked at clean Sharpe 0.67 (MACDMomentum, 1h single-pair family).
    v0.2.0's retrospective identified "MTF, cross-pair, per-asset metrics"
    as the three missing affordances. v0.3.0 adds all three simultaneously.
    Two independent runs confirmed MTF + cross-pair are load-bearing:
    - Run 1 (apr24): peak Sharpe 1.07 via cross-pair breakout (BTCLeaderBreakX)
    - Run 2 (apr24b): 3 paradigms all ≥ 0.52, systematic paradigm-specific MTF mapping

asset:
  pairs: [BTC/USDT, ETH/USDT, SOL/USDT, BNB/USDT, AVAX/USDT]
  timeframes_base: 1h
  timeframes_informative: [4h, 1d]
  timerange: 20230101-20251231
  exchange: binance

experiments:
  runs:
    - branch: autoresearch/apr24
      rounds: 39
      total_events: 120
      peak_sharpe: 1.0716
      events_by_type:
        create: 5
        evolve: 46
        fork: 1
        kill: 3
        stable: 65
    - branch: autoresearch/apr24b
      rounds: 39
      total_events: 120
      peak_sharpe: 0.6388
      events_by_type:
        create: 3
        evolve: 44
        fork: 0
        kill: 0
        stable: 73
  combined:
    total_rounds: 78
    total_events: 240
    paradigms_tested: 5  # mean-reversion, trend-following, breakout, momentum, volatility
    paradigms_with_positive_edge: 4  # all except mean-reversion in run 1, all 3 in run 2
    key_finding: |
      MTF and cross-pair affordances are load-bearing but paradigm-specific.
      Cross-pair as PRIMARY signal (Run 1's BTCLeaderBreakX) produced the highest
      Sharpe (1.07). Cross-pair as SECONDARY filter (Run 2's MeanRevRSI BTC guard)
      added +0.04. MTF filters help when aligned with paradigm direction (oversold
      for MR, trend for TF) but harm when misaligned (1d regime on momentum).

final_portfolio_run2:
  - name: TrendMtfConfluence
    paradigm: trend-following
    sharpe: 0.6388
    max_dd_pct: -25.72
    peak_at_commit: a59b83c  # round 29, RSI exit 75→78
    status: alive, LEADER
    key_structure: 1d EMA200 regime + 4h EMA9>21 trend + 1h RSI 35-48 pullback
      entry + exit RSI>78 or 4h EMA cross. No stoploss. 12+ evo attempts
      confirmed this is the structural ceiling for this paradigm.
    per_pair_sharpes: "SOL 0.26 leads, AVAX -0.01 weakest"

  - name: MeanRevRSI
    paradigm: mean-reversion
    sharpe: 0.5725
    max_dd_pct: -16.39
    peak_at_commit: 57706fb  # round 34, BTC cross-pair RSI<40 added
    status: alive
    key_structure: 1d EMA50 regime + BTC cross-pair RSI<40 + 4h RSI<50 + 1h RSI<32
      + BB(20,2.2) lower + exit RSI>65 & close>BB_mid. 7-layer filter stack,
      all confirmed optimal through iterative bracketing. No stoploss.
    per_pair_sharpes: "BNB 0.32 leads (pf 2.94), SOL 0.14, AVAX -0.03 weakest"

  - name: CrossPairMomentum
    paradigm: momentum
    sharpe: 0.5208
    max_dd_pct: -8.14
    peak_at_commit: 30688d3  # round 32, stoploss removed
    status: alive
    key_structure: 4h EMA9>21 trend + own ROC>7 + BTC ROC>4 cross-pair + EMA50
      + volume expansion + exit ROC<-2. No stoploss. All 5 pairs positive
      for the first time in any strategy this run.
    per_pair_sharpes: "SOL 0.19 leads, all 5 positive, BNB 7 trades (sample issue)"

paradigm_specific_findings:
  - title: 1d regime filters are paradigm-specific
    detail: |
      EMA200 regime helps trend-following (+0.23 structural) and mean-reversion
      (+0.09, but EMA50 better than EMA200), but DESTROYS momentum (0.52→0.19).
      Momentum operates on shorter timeframes; 200-bar regime filters cancel
      the very signals the strategy seeks.
  - title: MTF RSI filters must align with entry direction
    detail: |
      4h RSI<50 helps mean-reversion (confirms multi-TF weakness → reversion).
      4h RSI<65 DESTROYS momentum (momentum entries happen when RSI is elevated
      — the filter eliminates the very entries we want). RSI 40-60 guardrail
      destroyed trend-following (pullbacks happen in low-RSI dips; the filter
      eliminates entry opportunities).
  - title: Stoplosses are universally harmful in this regime
    detail: |
      Confirmed across all 3 paradigms: adding any stoploss (<-0.15) degrades
      Sharpe. In the 2023-2025 bull regime, drawdowns eventually recover.
      Stoplosses force exits at the worst time and cause re-entry/double-stop
      patterns. This finding is regime-specific — the agent explicitly notes
      that a bear-included timerange would likely reverse this conclusion.
  - title: Volume filters are paradigm-context-dependent
    detail: |
      Volume expansion helps momentum (+0.07, validates breakout strength).
      Volume expansion is neutral for mean-reversion (0.001 delta).
      Volume was not tested on trend-following in this run. Run 1 found that
      volume confirmation on the TRADE pair is more important than on the
      signal source pair for cross-pair strategies.
  - title: Exit signal optimization is the highest-leverage change type
    detail: |
      The 4 highest-impact single-round changes were all exit-related:
      TrendMtf RSI 70→78 (+0.23), MeanRevRSI BB 2.0→2.2 (+0.14, entry but
      effectively exit-timing via entry quality), MeanRevRSI 4h RSI filter
      (+0.13), MeanRevRSI exit 70→65 (+0.15). Entry signal changes were
      consistently lower-impact or negative.
  - title: Cross-pair as primary vs secondary signal
    detail: |
      Run 1 (apr24): BTC cross-pair Donchian as PRIMARY entry signal → Sharpe 1.07.
      Run 2 (apr24b): BTC cross-pair as SECONDARY filter → +0.04 (MR), defines
      the strategy (momentum). Cross-pair-as-primary appears to have higher
      Sharpe potential but is harder to discover (5 strategies tested in Run 1
      vs 3 in Run 2). Both runs found cross-pair affordance load-bearing.

behavioral_observations:
  - title: Zero forks in Run 2, zero kills
    note: |
      With all 3 starting paradigms producing positive edge, no strategy was
      ever killed. Fork never made sense at cap=3 with all slots productive.
      v0.1.0 + v0.2.0 combined: 180 rounds, 0 forks. Run 1: 1 fork. Run 2:
      0 forks. Fork appears to require a specific condition: a strategy
      valuable enough to preserve + an idea risky enough to test separately.
  - title: Zero Goodhart — fourth run in a row
    note: |
      Multi-strategy comparison + prior-retrospective awareness + per-pair
      reporting create a 3-layer defense against oracle gaming. Agent never
      triggered Sharpe-up-while-profit-down patterns.
  - title: Revert-as-primary-operation
    note: |
      ~29 of 44 evolves were reverted (66%). The agent's primary research
      pattern: try a change, measure, and revert if negative. This "try fast,
      fail fast" pattern is enabled by the fast backtest loop (~2 min/round).
  - title: Per-pair reporting drove real decisions
    note: |
      Agent tracked AVAX's persistent underperformance across all 3 strategies,
      noted BNB's dominance in mean-reversion (72-75% WR across all configs),
      and used SOL's trend-following strength to validate the trend paradigm.

limitations:
  - single_regime: |
      2023-2025 bull only. Agent explicitly notes this limitation and predicts
      stoplosses would become necessary in a bear-included regime.
  - no_benchmark: |
      No buy-and-hold comparison. Peak Sharpe 0.64 is clean but likely below
      BaH on this period.
  - small_per_pair_samples: |
      Some per-pair trade counts are very small (CrossPairMomentum BNB: 7 trades
      in 3 years). Per-pair Sharpe confidence intervals are wide.
  - no_out_of_sample: |
      Entire timerange used for both iteration and evaluation.
