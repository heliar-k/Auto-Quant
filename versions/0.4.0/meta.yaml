version: 0.4.0
title: Multi-regime + out-of-sample + cap=5 + exit-as-design
date_started: 2026-04-26
date_completed: 2026-04-26
branches:
  - v0.4.0
  - autoresearch/apr26

intervention:
  summary: |
    Four structural improvements on top of v0.3.x's validated paradigm suite:

    (1) Multi-regime backtesting: extend timerange to 2021-01-01 → 2026-01-29,
        covering the 2021 bull, 2022 bear, and 2023-2025 bull.
    (2) Out-of-sample validation: train on 2023-01-01 → 2024-12-31, validate
        on 2025-01-01 → 2026-01-29.
    (3) Cap=5: raise the hard cap from 3 to 5 active strategies.
    (4) Exit mechanism as first-class design object.
  vs_v0_3_x: |
    v0.3.0 (3 runs, 178 rounds) + v0.3.1 (1 run, 19 rounds) validated 4
    distinct paradigms, injected buy-and-hold benchmark, and established
    that asset × paradigm interaction dominates aggregate tuning.

    v0.4.0 adds train/test split and multi-regime data. The split proved
    critical: removing 1d regime filters boosted train Sharpe dramatically
    (TrendMtfConfluence 1.40→2.16) but caused catastrophic test failure
    (-1.31). The architecture caught what the loop could not.

asset:
  pairs: [BTC/USDT, ETH/USDT, SOL/USDT, BNB/USDT, AVAX/USDT]
  timeframes_base: 1h
  timeframes_informative: [4h, 1d]
  timerange_train: 20230101-20241231
  timerange_test: 20250101-20260129
  timerange_full: 20210101-20260129
  exchange: binance

benchmark:
  train:
    equal_weight_profit_pct: 571.12
    equal_weight_dd_pct: -48.21
    per_pair:
      BTC/USDT: { profit_pct: 466.11, dd_pct: -32.31 }
      ETH/USDT: { profit_pct: 179.52, dd_pct: -46.66 }
      SOL/USDT: { profit_pct: 1794.99, dd_pct: -47.18 }
      BNB/USDT: { profit_pct: 185.84, dd_pct: -42.65 }
      AVAX/USDT: { profit_pct: 229.12, dd_pct: -72.26 }

experiment:
  branch: autoresearch/apr26
  rounds: 50
  total_events: 250
  peak_train_sharpe: 2.1607
  peak_test_sharpe: 0.2598
  peak_full_sharpe: 0.8926
  events_by_type:
    create: 5
    evolve: 45
    fork: 2
    kill: 3
    stable: 195
  key_finding: |
    Train/test split caught massive overfitting. Removing 1d regime filters
    boosted train Sharpe (TrendMtf +0.76, SuperTrend +1.08) but destroyed
    test performance (TrendMtf 2.16→-1.31, SuperTrend 1.81→-0.77). The 1d
    regime filter is structural regularization — its removal inflates train
    metrics at the cost of generalization. LeaderVolumeMomentum is the most
    robust strategy (positive on train, test, and full multi-regime).

    SuperTrend is a viable new paradigm (first attempt 0.70 train, 0.36 full).
    All legacy v0.3.x optima confirmed robust — even 2-period parameter
    changes cause regression. Cross-pair-primary failed on train period
    (2 attempts, both killed). Zero Goodhart in 50 rounds (5th clean run).

